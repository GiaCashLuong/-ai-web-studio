<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Web Studio – Tạo dự án mới</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .np-wrap { max-width:720px; margin:0 auto; }
    .ai-thinking { display:none; text-align:center; padding:3rem 0; }
    .ai-thinking .robot { font-size:4rem; animation:bob 1s ease-in-out infinite alternate; display:block; }
    @keyframes bob { from{transform:translateY(0)} to{transform:translateY(-10px)} }
    .ai-thinking p { color:var(--muted); margin-top:.75rem; }
    .tag-btn { background:var(--surface2); border:1px solid var(--border); color:var(--muted); border-radius:999px; padding:.35rem .85rem; font-size:.83rem; cursor:pointer; transition:all .2s; }
    .tag-btn:hover,.tag-btn.active { background:var(--primary); border-color:var(--primary); color:#fff; }
    .tags-row { display:flex; flex-wrap:wrap; gap:.5rem; margin-bottom:1.25rem; }
    .char-count { text-align:right; font-size:.78rem; color:var(--muted); margin-top:.25rem; }
  </style>
</head>
<body>
  <nav id="nav"></nav>

  <div class="page">
    <div class="container section-sm">
      <div class="np-wrap">
        <div class="mb-4">
          <a href="/dashboard.html" class="text-muted text-sm" id="back_link">← Quay lại Dashboard</a>
          <h1 style="font-size:2rem;font-weight:800;margin-top:.75rem" id="page_title">Tạo yêu cầu dự án mới</h1>
          <p class="text-muted mt-1" id="page_sub">Mô tả ngắn gọn – AI sẽ tự động tạo bản báo giá chi tiết cho bạn.</p>
        </div>

        <div id="alert-box"></div>

        <!-- FORM -->
        <form id="project-form" onsubmit="submitProject(event)">
          <div class="card">
            <div class="form-group">
              <label id="lbl_title">Tên dự án / sản phẩm</label>
              <input type="text" class="form-control" id="proj-title" placeholder="VD: Website bán hàng thời trang, App đặt lịch..." required maxlength="100" />
            </div>

            <div class="form-group">
              <label id="lbl_type">Loại website</label>
              <div class="tags-row" id="type-tags">
                <button type="button" class="tag-btn" data-val="landing">Landing Page</button>
                <button type="button" class="tag-btn" data-val="ecommerce">E-commerce</button>
                <button type="button" class="tag-btn" data-val="webapp">Web App</button>
                <button type="button" class="tag-btn" data-val="blog">Blog / Portfolio</button>
                <button type="button" class="tag-btn" data-val="corporate">Corporate</button>
                <button type="button" class="tag-btn" data-val="other">Khác</button>
              </div>
              <input type="hidden" id="proj-type" />
            </div>

            <div class="form-group">
              <label id="lbl_desc">Mô tả chi tiết yêu cầu</label>
              <textarea class="form-control" id="proj-desc" rows="6"
                placeholder="VD: Tôi cần một website bán quần áo thời trang nữ, có giỏ hàng, thanh toán online qua VNPay và Momo, tích hợp chat tư vấn, giao diện hiện đại tone màu hồng pastel, mobile-first..."
                required maxlength="2000" oninput="updateCount(this,2000,'count-desc')"></textarea>
              <div class="char-count"><span id="count-desc">0</span>/2000</div>
            </div>

            <div class="form-group">
              <label id="lbl_budget">Ngân sách dự kiến (không bắt buộc)</label>
              <div class="tags-row" id="budget-tags">
                <button type="button" class="tag-btn" data-val="under5m" id="b1">Dưới 5 triệu</button>
                <button type="button" class="tag-btn" data-val="5-15m" id="b2">5–15 triệu</button>
                <button type="button" class="tag-btn" data-val="15-30m" id="b3">15–30 triệu</button>
                <button type="button" class="tag-btn" data-val="over30m" id="b4">Trên 30 triệu</button>
              </div>
              <input type="hidden" id="proj-budget" />
            </div>

            <div class="form-group">
              <label id="lbl_deadline">Thời gian mong muốn hoàn thành</label>
              <select class="form-control" id="proj-deadline">
                <option value="asap" id="d1">Càng sớm càng tốt</option>
                <option value="1week" id="d2">Trong 1 tuần</option>
                <option value="2weeks" id="d3">Trong 2 tuần</option>
                <option value="1month" id="d4">Trong 1 tháng</option>
                <option value="flexible" id="d5">Linh hoạt</option>
              </select>
            </div>

            <button type="submit" class="btn-primary btn-lg" style="width:100%" id="submit_btn">
              🤖 Gửi yêu cầu & để AI tạo báo giá
            </button>
          </div>
        </form>

        <!-- AI THINKING -->
        <div class="ai-thinking" id="ai-thinking">
          <span class="robot">🤖</span>
          <h3 id="ai_thinking_title">AI đang phân tích yêu cầu của bạn...</h3>
          <p id="ai_thinking_sub">Thường mất 10–20 giây. Vui lòng đợi.</p>
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/supabase.min.js"></script>
  <script src="/js/config.js"></script>
  <script>
    const tx = {
      vi: { back_link:'← Quay lại Dashboard', page_title:'Tạo yêu cầu dự án mới', page_sub:'Mô tả ngắn gọn – AI sẽ tự động tạo bản báo giá chi tiết cho bạn.', lbl_title:'Tên dự án / sản phẩm', lbl_type:'Loại website', lbl_desc:'Mô tả chi tiết yêu cầu', lbl_budget:'Ngân sách dự kiến (không bắt buộc)', lbl_deadline:'Thời gian mong muốn hoàn thành', submit_btn:'🤖 Gửi yêu cầu & để AI tạo báo giá', ai_thinking_title:'AI đang phân tích yêu cầu của bạn...', ai_thinking_sub:'Thường mất 10–20 giây. Vui lòng đợi.', b1:'Dưới 5 triệu', b2:'5–15 triệu', b3:'15–30 triệu', b4:'Trên 30 triệu', d1:'Càng sớm càng tốt', d2:'Trong 1 tuần', d3:'Trong 2 tuần', d4:'Trong 1 tháng', d5:'Linh hoạt', err_type:'Vui lòng chọn loại website.', err_api:'Lỗi gọi AI. Vui lòng thử lại.' },
      en: { back_link:'← Back to Dashboard', page_title:'Create New Project Request', page_sub:'Describe briefly – AI will automatically create a detailed quote for you.', lbl_title:'Project / Product Name', lbl_type:'Website Type', lbl_desc:'Detailed Requirements', lbl_budget:'Estimated Budget (optional)', lbl_deadline:'Desired Completion Time', submit_btn:'🤖 Submit & Let AI Quote', ai_thinking_title:'AI is analyzing your request...', ai_thinking_sub:'Usually takes 10–20 seconds. Please wait.', b1:'Under $200', b2:'$200–$600', b3:'$600–$1,200', b4:'Over $1,200', d1:'ASAP', d2:'Within 1 week', d3:'Within 2 weeks', d4:'Within 1 month', d5:'Flexible', err_type:'Please select a website type.', err_api:'AI API error. Please try again.' }
    };
    const lang = localStorage.getItem('lang')||'vi';

    document.addEventListener('DOMContentLoaded', async () => {
      Object.keys(tx[lang]).forEach(k => { const el=document.getElementById(k); if(el) el.textContent=tx[lang][k]; });
      renderNav('');
      await requireAuth();

      // tag buttons
      document.querySelectorAll('#type-tags .tag-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('#type-tags .tag-btn').forEach(b=>b.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById('proj-type').value = btn.dataset.val;
        });
      });
      document.querySelectorAll('#budget-tags .tag-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('#budget-tags .tag-btn').forEach(b=>b.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById('proj-budget').value = btn.dataset.val;
        });
      });
    });

    function updateCount(el, max, countId) {
      document.getElementById(countId).textContent = el.value.length;
    }

    async function submitProject(e) {
      e.preventDefault();
      const type = document.getElementById('proj-type').value;
      if (!type) { showAlert(tx[lang].err_type,'error'); return; }

      const title = document.getElementById('proj-title').value;
      const desc = document.getElementById('proj-desc').value;
      const budget = document.getElementById('proj-budget').value;
      const deadline = document.getElementById('proj-deadline').value;

      // show AI thinking
      document.getElementById('project-form').style.display = 'none';
      document.getElementById('ai-thinking').style.display = 'block';

      const user = await getUser();

      // Call Supabase Edge Function to invoke Claude API
      const { data: fnData, error: fnErr } = await supabase.functions.invoke('generate-quote', {
        body: { title, type, description: desc, budget, deadline, userId: user.id, lang }
      });

      if (fnErr || !fnData?.projectId) {
        document.getElementById('ai-thinking').style.display = 'none';
        document.getElementById('project-form').style.display = 'block';
        showAlert(tx[lang].err_api + (fnErr?.message ? ': '+fnErr.message : ''), 'error');
        return;
      }

      window.location.href = `/quote.html?id=${fnData.projectId}`;
    }

    function showAlert(msg, type) {
      document.getElementById('alert-box').innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
    }
  </script>
</body>
</html>
