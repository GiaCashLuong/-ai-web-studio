<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Web Studio – Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .dash-header { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem; margin-bottom:2.5rem; }
    .project-card { cursor:pointer; transition:transform .15s, border-color .15s; }
    .project-card:hover { transform:translateY(-3px); border-color: var(--primary); }
    .project-meta { display:flex; justify-content:space-between; align-items:center; margin-top:1rem; flex-wrap:wrap; gap:.5rem; }
    .project-date { font-size:.8rem; color:var(--muted); }
    .project-title { font-weight:700; font-size:1.05rem; margin-bottom:.4rem; }
    .project-desc { color:var(--muted); font-size:.9rem; line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .greeting { font-size:1.5rem; font-weight:700; }
    .greeting span { color:var(--primary); }
  </style>
</head>
<body>
  <nav id="nav"></nav>

  <div class="page">
    <div class="container section-sm">

      <div class="dash-header">
        <div>
          <div class="greeting" id="greeting"></div>
          <p class="text-muted mt-1" id="dash_sub">Đây là danh sách các dự án của bạn.</p>
        </div>
        <a href="/new-project.html" class="btn-primary" id="new_project_btn">+ Dự án mới</a>
      </div>

      <!-- STATS ROW -->
      <div class="grid-4 mb-4" id="stats-row">
        <div class="card text-center">
          <div style="font-size:2rem;font-weight:800;color:var(--primary)" id="count-total">–</div>
          <div class="text-muted text-sm mt-1" id="lbl_total">Tổng dự án</div>
        </div>
        <div class="card text-center">
          <div style="font-size:2rem;font-weight:800;color:#fbbf24" id="count-pending">–</div>
          <div class="text-muted text-sm mt-1" id="lbl_pending">Chờ báo giá</div>
        </div>
        <div class="card text-center">
          <div style="font-size:2rem;font-weight:800;color:#818cf8" id="count-quoted">–</div>
          <div class="text-muted text-sm mt-1" id="lbl_quoted">Đã có báo giá</div>
        </div>
        <div class="card text-center">
          <div style="font-size:2rem;font-weight:800;color:var(--success)" id="count-paid">–</div>
          <div class="text-muted text-sm mt-1" id="lbl_paid">Đã thanh toán</div>
        </div>
      </div>

      <div id="alert-box"></div>
      <div id="projects-container"></div>
    </div>
  </div>

  <footer>
    <div class="container">
      <p id="footer_copy"></p>
    </div>
  </footer>

  <script src="/js/supabase.min.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/page-dashboard.js"></script>
</body>
</html>
