<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Web Studio – Thanh toán thành công!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .confetti-container { position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:9999; }
    .confetti-piece { position:absolute; width:10px; height:10px; opacity:0; animation:confettiFall linear forwards; }
    @keyframes confettiFall {
      0%   { opacity:1; top:-10px; transform:rotate(0deg) translateX(0); }
      100% { opacity:0; top:110vh; transform:rotate(720deg) translateX(var(--drift)); }
    }
    .success-icon { font-size:6rem; animation:popIn .5s cubic-bezier(.36,.07,.19,.97) both; display:block; margin-bottom:1.5rem; }
    @keyframes popIn { 0%{transform:scale(0) rotate(-10deg);opacity:0} 80%{transform:scale(1.15) rotate(3deg)} 100%{transform:scale(1) rotate(0);opacity:1} }
    .success-card { max-width:560px; width:100%; background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:3rem; text-align:center; }
    .success-h1 { font-size:2.2rem; font-weight:800; margin-bottom:.75rem; }
    .success-h1 span { background:linear-gradient(135deg,var(--primary),var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .receipt-row { display:flex; justify-content:space-between; padding:.5rem 0; border-bottom:1px solid var(--border); font-size:.9rem; }
    .receipt-row:last-child { border-bottom:none; }
  </style>
</head>
<body>
  <nav id="nav"></nav>
  <div class="confetti-container" id="confetti"></div>

  <div class="page flex-center" style="min-height:90vh;padding:5rem 1.5rem 2rem;">
    <div class="success-card">
      <span class="success-icon" id="success-icon">🎉</span>
      <h1 class="success-h1" id="success_title">Thanh toán <span>thành công!</span></h1>
      <p class="text-muted mt-1 mb-4" id="success_sub">Cảm ơn bạn! Chúng tôi đã nhận được thanh toán và sẽ bắt đầu dự án của bạn ngay.</p>

      <div id="receipt" style="background:var(--surface2);border-radius:10px;padding:1.25rem;margin-bottom:2rem;text-align:left;"></div>

      <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap">
        <a href="/dashboard.html" class="btn-primary" id="btn_dashboard">Xem Dashboard</a>
        <a href="/new-project.html" class="btn-secondary" id="btn_new">Tạo dự án mới</a>
      </div>
    </div>
  </div>

  <script src="/js/supabase.min.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/page-success.js"></script>
</body>
</html>
