<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Web Studio – Thanh toán thành công!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .confetti-container { position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:9999; }
    .confetti-piece { position:absolute; width:10px; height:10px; opacity:0; animation:confettiFall linear forwards; }
    @keyframes confettiFall {
      0%   { opacity:1; top:-10px; transform:rotate(0deg) translateX(0); }
      100% { opacity:0; top:110vh; transform:rotate(720deg) translateX(var(--drift)); }
    }
    .success-icon { font-size:6rem; animation:popIn .5s cubic-bezier(.36,.07,.19,.97) both; display:block; margin-bottom:1.5rem; }
    @keyframes popIn { 0%{transform:scale(0) rotate(-10deg);opacity:0} 80%{transform:scale(1.15) rotate(3deg)} 100%{transform:scale(1) rotate(0);opacity:1} }
    .success-card { max-width:560px; width:100%; background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:3rem; text-align:center; }
    .success-h1 { font-size:2.2rem; font-weight:800; margin-bottom:.75rem; }
    .success-h1 span { background:linear-gradient(135deg,var(--primary),var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .receipt-row { display:flex; justify-content:space-between; padding:.5rem 0; border-bottom:1px solid var(--border); font-size:.9rem; }
    .receipt-row:last-child { border-bottom:none; }
  </style>
</head>
<body>
  <nav id="nav"></nav>
  <div class="confetti-container" id="confetti"></div>

  <div class="page flex-center" style="min-height:90vh;padding:5rem 1.5rem 2rem;">
    <div class="success-card">
      <span class="success-icon" id="success-icon">🎉</span>
      <h1 class="success-h1" id="success_title">Thanh toán <span>thành công!</span></h1>
      <p class="text-muted mt-1 mb-4" id="success_sub">Cảm ơn bạn! Chúng tôi đã nhận được thanh toán và sẽ bắt đầu dự án của bạn ngay.</p>

      <div id="receipt" style="background:var(--surface2);border-radius:10px;padding:1.25rem;margin-bottom:2rem;text-align:left;"></div>

      <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap">
        <a href="/dashboard.html" class="btn-primary" id="btn_dashboard">Xem Dashboard</a>
        <a href="/new-project.html" class="btn-secondary" id="btn_new">Tạo dự án mới</a>
      </div>
    </div>
  </div>

  <script src="/js/supabase.min.js"></script>
  <script src="/js/config.js"></script>
  <script>
    const tx = {
      vi: { success_title:'Thanh toán <span>thành công!</span>', success_sub:'Cảm ơn bạn! Chúng tôi đã nhận được thanh toán và sẽ bắt đầu dự án của bạn ngay.', btn_dashboard:'Xem Dashboard', btn_new:'Tạo dự án mới', lbl_project:'Dự án', lbl_amount:'Số tiền', lbl_date:'Ngày thanh toán', lbl_status:'Trạng thái', status_paid:'Đã thanh toán ✓' },
      en: { success_title:'Payment <span>Successful!</span>', success_sub:'Thank you! We have received your payment and will start your project right away.', btn_dashboard:'View Dashboard', btn_new:'New Project', lbl_project:'Project', lbl_amount:'Amount', lbl_date:'Payment Date', lbl_status:'Status', status_paid:'Paid ✓' }
    };
    const lang = localStorage.getItem('lang')||'vi';
    const colors = ['#6366f1','#8b5cf6','#ec4899','#f59e0b','#10b981','#3b82f6','#ef4444'];

    function launchConfetti() {
      const container = document.getElementById('confetti');
      for (let i=0;i<120;i++) {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        const size = Math.random()*10+6;
        el.style.cssText = `
          left:${Math.random()*100}%;
          width:${size}px; height:${size}px;
          background:${colors[Math.floor(Math.random()*colors.length)]};
          border-radius:${Math.random()>.5?'50%':'2px'};
          animation-duration:${Math.random()*2+1.5}s;
          animation-delay:${Math.random()*.8}s;
          --drift:${(Math.random()-0.5)*200}px;
        `;
        container.appendChild(el);
      }
      setTimeout(() => container.innerHTML='', 5000);
    }

    document.addEventListener('DOMContentLoaded', async () => {
      document.getElementById('success_title').innerHTML = tx[lang].success_title;
      document.getElementById('success_sub').textContent = tx[lang].success_sub;
      document.getElementById('btn_dashboard').textContent = tx[lang].btn_dashboard;
      document.getElementById('btn_new').textContent = tx[lang].btn_new;
      renderNav('');
      launchConfetti();

      const params = new URLSearchParams(location.search);
      const sessionId = params.get('session_id');
      const projectId = params.get('project_id');

      // Mark project as paid (Stripe webhook handles server-side; this is UX-only update)
      if (projectId) {
        await supabase.from('projects').update({ status:'paid', paid_at: new Date().toISOString() }).eq('id', projectId);
        const { data: p } = await supabase.from('projects').select('title,total_price,created_at').eq('id', projectId).single();
        if (p) {
          document.getElementById('receipt').innerHTML = `
            <div class="receipt-row"><span>${tx[lang].lbl_project}</span><span style="font-weight:600">${escHtml(p.title)}</span></div>
            <div class="receipt-row"><span>${tx[lang].lbl_amount}</span><span style="font-weight:700;color:var(--primary)">${formatMoney(p.total_price||0)}</span></div>
            <div class="receipt-row"><span>${tx[lang].lbl_date}</span><span>${new Date().toLocaleDateString(lang==='vi'?'vi-VN':'en-US',{year:'numeric',month:'long',day:'numeric'})}</span></div>
            <div class="receipt-row"><span>${tx[lang].lbl_status}</span><span style="color:var(--success);font-weight:600">${tx[lang].status_paid}</span></div>
          `;
        }
      } else {
        document.getElementById('receipt').style.display = 'none';
      }

      // Repeat confetti burst after 1s
      setTimeout(launchConfetti, 1200);
    });

    function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function formatMoney(v){ return new Intl.NumberFormat(lang==='vi'?'vi-VN':'en-US',{style:'currency',currency:lang==='vi'?'VND':'USD'}).format(v); }
  </script>
</body>
</html>
