<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Web Studio – Xem báo giá</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .quote-wrap { max-width:800px; margin:0 auto; }
    .quote-header { background:linear-gradient(135deg,var(--primary),var(--accent)); border-radius:var(--radius); padding:2rem; margin-bottom:1.5rem; color:#fff; }
    .quote-header h2 { font-size:1.5rem; font-weight:700; }
    .quote-header .meta { opacity:.85; font-size:.9rem; margin-top:.5rem; }
    .section-label { font-size:.75rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:.75rem; }
    .feature-item { display:flex; gap:.75rem; padding:.5rem 0; border-bottom:1px solid var(--border); }
    .feature-item:last-child { border-bottom:none; }
    .feature-check { color:var(--success); flex-shrink:0; }
    .sign-area { position:relative; }
    .sign-controls { display:flex; gap:.75rem; margin-top:.75rem; flex-wrap:wrap; }
    #signatureCanvas { height:160px; }
    .stripe-logos { display:flex; gap:.5rem; align-items:center; flex-wrap:wrap; margin-top:.75rem; }
    .stripe-logos img { height:24px; opacity:.7; }
    .pay-note { font-size:.8rem; color:var(--muted); }
  </style>
</head>
<body>
  <nav id="nav"></nav>

  <div class="page">
    <div class="container section-sm">
      <div class="quote-wrap">
        <a href="/dashboard.html" class="text-muted text-sm" id="back_link">← Quay lại Dashboard</a>

        <div id="alert-box" class="mt-2"></div>
        <div id="spinner" class="spinner mt-4"></div>
        <div id="quote-content" style="display:none"></div>
      </div>
    </div>
  </div>

  <!-- Stripe.js -->
  <script src="https://js.stripe.com/v3/"></script>
  <script src="/js/supabase.min.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/page-quote.js"></script>
</body>
</html>
