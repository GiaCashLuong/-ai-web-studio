<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Web Studio – Đăng nhập / Đăng ký</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 6rem 1.5rem 2rem; }
    .auth-card { width: 100%; max-width: 440px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; }
    .auth-logo { text-align: center; margin-bottom: 2rem; }
    .auth-logo .icon { font-size: 3rem; display: block; }
    .auth-tabs { display: flex; background: var(--surface2); border-radius: 10px; padding: 4px; margin-bottom: 2rem; }
    .auth-tab { flex: 1; text-align: center; padding: .6rem; border-radius: 8px; cursor: pointer; font-weight: 600; color: var(--muted); transition: background .2s, color .2s; border: none; background: none; font-family: inherit; font-size: .95rem; }
    .auth-tab.active { background: var(--primary); color: #fff; }
    .divider-or { display: flex; align-items: center; gap: 1rem; margin: 1.25rem 0; color: var(--muted); font-size: .85rem; }
    .divider-or::before, .divider-or::after { content:''; flex:1; height:1px; background: var(--border); }
    .social-btn { width: 100%; display: flex; align-items: center; justify-content: center; gap: .75rem; padding: .7rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-weight: 500; cursor: pointer; transition: border-color .2s; font-family: inherit; font-size: .95rem; }
    .social-btn:hover { border-color: var(--primary); }
    .forgot-link { font-size: .85rem; color: var(--muted); text-align: right; display: block; margin-top: .25rem; }
    .forgot-link:hover { color: var(--primary); }
  </style>
</head>
<body>
  <nav id="nav"></nav>

  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="icon">⚡</span>
        <span style="font-size:1.25rem;font-weight:800;">AI Web Studio</span>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login"><span id="tab_login">Đăng nhập</span></button>
        <button class="auth-tab" id="tab-register"><span id="tab_register">Đăng ký</span></button>
      </div>

      <div id="alert-box"></div>

      <!-- Google SSO -->
      <button class="social-btn">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        <span id="google_btn">Tiếp tục với Google</span>
      </button>

      <div class="divider-or"><span id="or_text">hoặc</span></div>

      <!-- LOGIN FORM -->
      <form id="form-login">
        <div class="form-group">
          <label id="email_label">Email</label>
          <input type="email" class="form-control" id="login-email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label id="pass_label">Mật khẩu</label>
          <input type="password" class="form-control" id="login-password" placeholder="••••••••" required />
          <a href="#" class="forgot-link" id="forgot_link">Quên mật khẩu?</a>
        </div>
        <button type="submit" class="btn-primary" style="width:100%;margin-top:.5rem" id="login_btn">Đăng nhập</button>
      </form>

      <!-- REGISTER FORM -->
      <form id="form-register" style="display:none">
        <div class="form-group">
          <label id="name_label">Họ và tên</label>
          <input type="text" class="form-control" id="reg-name" placeholder="Nguyễn Văn A" required />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" class="form-control" id="reg-email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label id="reg_pass_label">Mật khẩu</label>
          <input type="password" class="form-control" id="reg-password" placeholder="Ít nhất 8 ký tự" minlength="8" required />
        </div>
        <button type="submit" class="btn-primary" style="width:100%;margin-top:.5rem" id="register_btn">Tạo tài khoản</button>
      </form>
    </div>
  </div>

  <script src="/js/supabase.min.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/page-auth.js"></script>
</body>
</html>
