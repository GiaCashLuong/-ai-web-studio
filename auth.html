<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Web Studio – Đăng nhập / Đăng ký</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 6rem 1.5rem 2rem; }
    .auth-card { width: 100%; max-width: 440px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; }
    .auth-logo { text-align: center; margin-bottom: 2rem; }
    .auth-logo .icon { font-size: 3rem; display: block; }
    .auth-tabs { display: flex; background: var(--surface2); border-radius: 10px; padding: 4px; margin-bottom: 2rem; }
    .auth-tab { flex: 1; text-align: center; padding: .6rem; border-radius: 8px; cursor: pointer; font-weight: 600; color: var(--muted); transition: background .2s, color .2s; border: none; background: none; font-family: inherit; font-size: .95rem; }
    .auth-tab.active { background: var(--primary); color: #fff; }
    .divider-or { display: flex; align-items: center; gap: 1rem; margin: 1.25rem 0; color: var(--muted); font-size: .85rem; }
    .divider-or::before, .divider-or::after { content:''; flex:1; height:1px; background: var(--border); }
    .social-btn { width: 100%; display: flex; align-items: center; justify-content: center; gap: .75rem; padding: .7rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-weight: 500; cursor: pointer; transition: border-color .2s; font-family: inherit; font-size: .95rem; }
    .social-btn:hover { border-color: var(--primary); }
    .forgot-link { font-size: .85rem; color: var(--muted); text-align: right; display: block; margin-top: .25rem; }
    .forgot-link:hover { color: var(--primary); }
  </style>
</head>
<body>
  <nav id="nav"></nav>

  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="icon">⚡</span>
        <span style="font-size:1.25rem;font-weight:800;">AI Web Studio</span>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchTab('login')"><span id="tab_login">Đăng nhập</span></button>
        <button class="auth-tab" id="tab-register" onclick="switchTab('register')"><span id="tab_register">Đăng ký</span></button>
      </div>

      <div id="alert-box"></div>

      <!-- Google SSO -->
      <button class="social-btn" onclick="signInGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        <span id="google_btn">Tiếp tục với Google</span>
      </button>

      <div class="divider-or"><span id="or_text">hoặc</span></div>

      <!-- LOGIN FORM -->
      <form id="form-login" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label id="email_label">Email</label>
          <input type="email" class="form-control" id="login-email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label id="pass_label">Mật khẩu</label>
          <input type="password" class="form-control" id="login-password" placeholder="••••••••" required />
          <a href="#" class="forgot-link" onclick="handleForgot(event)" id="forgot_link">Quên mật khẩu?</a>
        </div>
        <button type="submit" class="btn-primary" style="width:100%;margin-top:.5rem" id="login_btn">Đăng nhập</button>
      </form>

      <!-- REGISTER FORM -->
      <form id="form-register" style="display:none" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label id="name_label">Họ và tên</label>
          <input type="text" class="form-control" id="reg-name" placeholder="Nguyễn Văn A" required />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" class="form-control" id="reg-email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label id="reg_pass_label">Mật khẩu</label>
          <input type="password" class="form-control" id="reg-password" placeholder="Ít nhất 8 ký tự" minlength="8" required />
        </div>
        <button type="submit" class="btn-primary" style="width:100%;margin-top:.5rem" id="register_btn">Tạo tài khoản</button>
      </form>
    </div>
  </div>

  <script src="/js/supabase.min.js"></script>
  <script src="/js/config.js"></script>
  <script>
    const tx = {
      vi: { tab_login:'Đăng nhập',tab_register:'Đăng ký',google_btn:'Tiếp tục với Google',or_text:'hoặc',email_label:'Email',pass_label:'Mật khẩu',forgot_link:'Quên mật khẩu?',login_btn:'Đăng nhập',name_label:'Họ và tên',reg_pass_label:'Mật khẩu',register_btn:'Tạo tài khoản',err_email:'Vui lòng kiểm tra email để xác nhận tài khoản!',err_login:'Email hoặc mật khẩu không đúng.',err_forgot:'Đã gửi email đặt lại mật khẩu!' },
      en: { tab_login:'Login',tab_register:'Register',google_btn:'Continue with Google',or_text:'or',email_label:'Email',pass_label:'Password',forgot_link:'Forgot password?',login_btn:'Login',name_label:'Full Name',reg_pass_label:'Password',register_btn:'Create Account',err_email:'Please check your email to verify your account!',err_login:'Invalid email or password.',err_forgot:'Password reset email sent!' }
    };
    const lang = localStorage.getItem('lang')||'vi';
    document.addEventListener('DOMContentLoaded', () => {
      Object.keys(tx[lang]).forEach(k => { const el=document.getElementById(k); if(el) el.textContent=tx[lang][k]; });
      renderNav('');
      supabase.auth.getUser().then(({data:{user}}) => { if(user) window.location.href='/dashboard.html'; });
    });

    function switchTab(tab) {
      document.getElementById('form-login').style.display = tab==='login'?'block':'none';
      document.getElementById('form-register').style.display = tab==='register'?'block':'none';
      document.getElementById('tab-login').classList.toggle('active', tab==='login');
      document.getElementById('tab-register').classList.toggle('active', tab==='register');
      showAlert('','');
    }

    function showAlert(msg, type) {
      const box = document.getElementById('alert-box');
      box.innerHTML = msg ? `<div class="alert alert-${type}">${msg}</div>` : '';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login_btn');
      btn.textContent = '...'; btn.disabled = true;
      const { error } = await supabase.auth.signInWithPassword({
        email: document.getElementById('login-email').value,
        password: document.getElementById('login-password').value,
      });
      if (error) { showAlert(tx[lang].err_login,'error'); btn.textContent=tx[lang].login_btn; btn.disabled=false; }
      else window.location.href = '/dashboard.html';
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('register_btn');
      btn.textContent = '...'; btn.disabled = true;
      const name = document.getElementById('reg-name').value;
      const { error } = await supabase.auth.signUp({
        email: document.getElementById('reg-email').value,
        password: document.getElementById('reg-password').value,
        options: { data: { full_name: name } }
      });
      if (error) { showAlert(error.message,'error'); }
      else { showAlert(tx[lang].err_email,'success'); }
      btn.textContent=tx[lang].register_btn; btn.disabled=false;
    }

    async function signInGoogle() {
      await supabase.auth.signInWithOAuth({ provider:'google', options:{ redirectTo: window.location.origin+'/dashboard.html' } });
    }

    async function handleForgot(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      if (!email) { showAlert('Nhập email trước.','error'); return; }
      await supabase.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin+'/auth.html' });
      showAlert(tx[lang].err_forgot,'success');
    }
  </script>
</body>
</html>
